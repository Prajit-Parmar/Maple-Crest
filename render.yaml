services:
  - type: web
    name: maple-crest-backend
    env: node
    region: oregon
    buildCommand: cd backend && npm ci && npx prisma generate && npm run build
    startCommand: cd backend && node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: maple-crest-db
          property: connectionString

databases:
  - name: maple-crest-db
    region: oregon
    databaseName: maple_crest
    plan: free
