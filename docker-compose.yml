version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: maple-crest-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: maple_crest_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: maple-crest-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/maple_crest_dev
      JWT_SECRET: maple-crest-super-secret-jwt-key-2024
      PORT: 5000
      NODE_ENV: production
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maple-crest-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      - backend

volumes:
  postgres_data:
